    <body>
        <div class="card" style="width: 100%">
            
                <div id="select-menu" class="card-header">
                    <div class="row no-gutters">
                        <div class="col-10 pb-2">
                            <select
                            class="form-select"
                            aria-label="Default select example"
                            onchange="selectNode([value]);"
                            id="select-node"
                            placeholder="Select node..."
                            >
                                <option selected>Select a Node by ID</option>
                                
                                    <option value="man of genius">man of genius</option>
                                
                                    <option value="makes no mistakes">makes no mistakes</option>
                                
                                    <option value="errors are volitional">errors are volitional</option>
                                
                                    <option value="errors">errors</option>
                                
                                    <option value="portals of discovery">portals of discovery</option>
                                
                            </select>
                        </div>
                        <div class="col-2 pb-2">
                            <button type="button" class="btn btn-primary btn-block" onclick="neighbourhoodHighlight({nodes: []});">Reset Selection</button>
                        </div>
                    </div>
                </div>
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              
                  new TomSelect("#select-node",{
                      create: false,
                      sortField: {
                          field: "text",
                          direction: "asc"
                      }
                  });
              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97C2FC", "font": {"color": "#ffffff"}, "id": "man of genius", "label": "man of genius", "shape": "dot", "size": 25, "title": "man of genius"}, {"color": "#97C2FC", "font": {"color": "#ffffff"}, "id": "makes no mistakes", "label": "makes no mistakes", "shape": "dot", "size": 25, "title": "makes no mistakes"}, {"color": "#97C2FC", "font": {"color": "#ffffff"}, "id": "errors are volitional", "label": "errors are volitional", "shape": "dot", "size": 25, "title": "errors are volitional"}, {"color": "#97C2FC", "font": {"color": "#ffffff"}, "id": "errors", "label": "errors", "shape": "dot", "size": 25, "title": "errors"}, {"color": "#97C2FC", "font": {"color": "#ffffff"}, "id": "portals of discovery", "label": "portals of discovery", "shape": "dot", "size": 25, "title": "portals of discovery"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "man of genius", "label": "characteristic", "title": "\uac00\uc911\uce58: 0.8", "to": "makes no mistakes", "value": 2.4000000000000004, "width": 1}, {"arrows": "to", "from": "man of genius", "label": "property or trait", "title": "\uac00\uc911\uce58: 0.9", "to": "errors are volitional", "value": 2.7, "width": 1}, {"arrows": "to", "from": "errors", "label": "result or outcome", "title": "\uac00\uc911\uce58: 0.7", "to": "portals of discovery", "value": 2.0999999999999996, "width": 1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"nodes": {"font": {"size": 22, "face": "Tahoma", "bold": true}, "borderWidth": 2, "borderWidthSelected": 6, "shadow": {"enabled": true, "color": "rgba(0,0,0,0.5)", "size": 10}}, "edges": {"color": {"inherit": false, "color": "#666666", "highlight": "#ffffff"}, "smooth": {"type": "curvedCW", "roundness": 0.2}, "font": {"size": 14, "color": "#aaaaaa", "strokeWidth": 0, "align": "middle"}, "arrows": {"to": {"scaleFactor": 0.8}}}, "physics": {"barnesHut": {"gravitationalConstant": -40000, "centralGravity": 0.1, "springLength": 300, "springConstant": 0.04}, "minVelocity": 0.75}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  
                    network.on("selectNode", neighbourhoodHighlight);
                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
